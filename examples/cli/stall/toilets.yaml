id: openrct2rg.ride.brick_toilets
name: Brick Toilets
description: A small brick toilet block
authors: [OpenRCT2-RideGenerator]
version: "1.0"

output_directory: .

# Facility: 6 view sprites. The doorway mesh (authored facing OBJ +X) is
# marked `door: true`: the generator cuts the door sprite out of the full
# building at the doorway's screen extent so guests sort into it. Toilets
# sell nothing and default to clearance 32.
ride_type: toilets

meshes:
  - toilets.obj
  - toilets_door.obj

model:
  - {mesh_index: 0, position: [0, 0, 0], orientation: [0, 0, 0]}
  - {mesh_index: 1, position: [0, 0, 0], orientation: [0, 0, 0], door: true}
