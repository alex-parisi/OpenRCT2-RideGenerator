id: openrct2rg.ride.enterprise
name: Enterprise
description: A wheel of enclosed pods that loop riders high over the park
authors: [OpenRCT2-RideGenerator]
version: "1.0"

output_directory: .

# Animated 4x4 flat ride (thrill category). The wheel is NOT vertically
# symmetric, so the engine stores 4 directions x 49 frames, interleaved with the
# direction as the fast index (Enterprise.cpp: base + (animationFrame << 2) +
# direction); the generator renders all four directions. The truss supports are
# base-game graphics, so the object provides only the rotating wheel (one mesh,
# centred at the origin). Unlike the ferris wheel's upright gondolas, the pods
# are rigidly attached and rotate WITH the wheel (riders invert), so the whole
# structure is one rigid spin about its axle (Z), lifted to the hub height. The
# 49 frames span one full turn, so frame 49 == frame 0. In Blender, keyframe
# this spin and the add-on samples the 49 poses for you. 48 blank rider slots
# follow; capacity defaults to 16, clearance to 160.
ride_type: enterprise

# The rim + pods are Remap1 (main) / Remap2 (trim), so painting stays on with
# main + trim presets (from ENTERP).
disable_painting: false
car_colours:
  - [bright_red, white, black]
  - [saturated_green, bright_red, black]
  - [light_blue, yellow, black]

meshes:
  - enterprise.obj

animation:
  frames:
