id: openrct2rg.ride.merry_go_round
name: Carousel
description: A merry-go-round whose horses spin beneath a striped canopy
authors: [OpenRCT2-RideGenerator]
version: "1.0"

output_directory: .

# Animated 3x3 flat ride. The whole carousel is one vehicle sprite that the
# engine spins by cycling a ring of rotation frames, so the structure is
# authored ONCE (carousel.obj, centred on the middle tile). The carousel is
# 4-fold symmetric, and the engine loops these 32 frames FOUR times per
# revolution (MerryGoRound.cpp: rotationOffset & 0x1F) while the riders sweep the
# full turn. So the 32 poses below span only ONE quarter turn (360/4 = 90
# degrees) about +Y in 32 even steps, NOT a full turn -- the platform must rotate
# at the riders' rate, or the horses spin 4x too fast. The single ring is reused
# for every view direction. In Blender you keyframe one full turn and the add-on
# samples the structure's 90-degree slice and the riders' full turn for you.
# Capacity (numSeats) defaults to 16.
ride_type: merry_go_round

# The canopy + saddle blankets are Remap1 (main colour) and the base platform is
# Remap2 (trim colour), so painting stays on with main + trim presets.
disable_painting: false
car_colours:
  - [bright_red, yellow, black]
  - [bright_pink, white, black]
  - [light_blue, bright_yellow, black]

meshes:
  - carousel.obj
  - carousel_rider.obj

animation:
  frames:
    - [{mesh_index: 0, position: [0, 0, 0], orientation: [0, 0, 0]}]
    - [{mesh_index: 0, position: [0, 0, 0], orientation: [2.812, 0, 0]}]
