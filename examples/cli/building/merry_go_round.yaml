# Visible riders. The rider ring is a seated rider-pair (carousel_rider.obj,
# mesh 1) the engine draws over the structure, recoloured per rider by the
# peep's t-shirt colour (Remap1 / Remap2 = the two shirts). The merry-go-round
# stores 68 rider poses: one seat's pair on the front-visible arc (ring
# positions 13..80 of 128), rotated about +Y like the platform. In Blender, mark
# the rider mesh with the Rider role and it samples with the spin.
rider_animation:
  frames:
