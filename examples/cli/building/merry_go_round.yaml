id: openrct2rg.ride.merry_go_round
name: Carousel
description: A merry-go-round whose horses spin beneath a striped canopy
authors: [OpenRCT2-RideGenerator]
version: "1.0"

output_directory: .

# Animated 3x3 flat ride. The whole carousel is one vehicle sprite that the
# engine spins by cycling a ring of rotation frames, so the structure is
# authored ONCE (carousel.obj, centred on the middle tile) and the animation
# below supplies one pose per rotation frame: a full 360-degree turn about +Y
# in 32 even steps (merry_go_round needs exactly 32). In Blender you keyframe
# the spin and the add-on samples these 32 poses for you; here they are written
# out explicitly. The engine reuses the ring for every view direction, so the
# carousel is built 4-fold symmetric. Capacity (numSeats) defaults to 16.
ride_type: merry_go_round

# The canopy + saddle blankets are Remap1 (main colour) and the base platform is
# Remap2 (trim colour), so painting stays on with main + trim presets.
disable_painting: false
car_colours:
  - [bright_red, yellow, black]
  - [bright_pink, white, black]
  - [light_blue, bright_yellow, black]

meshes:
  - carousel.obj
  - carousel_rider.obj

animation:
  frames:
    - [{mesh_index: 0, position: [0, 0, 0], orientation: [0, 0, 0]}]
    - [{mesh_index: 0, position: [0, 0, 0], orientation: [11.25, 0, 0]}]
    - [{mesh_index: 0, position: [0, 0, 0], orientation: [22.5, 0, 0]}]
