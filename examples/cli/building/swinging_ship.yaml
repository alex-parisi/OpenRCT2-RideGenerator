# Visible riders. 8 bench rows of rider-pairs (swinging_ship_rider.obj, mesh 1),
# each filling a sub-slot after its ship sprite, recoloured per rider by the
# peep's t-shirt colour (Remap1 / Remap2). Each row places the pair at a bench
# (4 fore-aft x 2 port/starboard) and swings it with the ship. In Blender, mark
# the rider meshes Rider and they sample with the swing.
