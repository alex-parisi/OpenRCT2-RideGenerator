id: openrct2rg.ride.ferris_wheel
name: Ferris Wheel
description: A ferris wheel whose gondolas circle high above the park
authors: [OpenRCT2-RideGenerator]
version: "1.0"

output_directory: .

# Animated 1x4 flat ride. Unlike the merry-go-round (one symmetric ring reused
# for every view), the wheel is NOT vertically symmetric, so the engine stores
# 4 directions x 8 frames (FerrisWheel.cpp: base + direction*8 + frame); the
# generator renders all four. The A-frame legs are base-game graphics, so the
# object provides only the rotating wheel (mesh 0) and the gondolas (mesh 1,
# placed 8 times). Each pose spins the wheel about its axle (Z) and orbits the
# gondolas, which stay upright. The 8 frames span one gondola spacing (45 deg),
# so the 8-fold-symmetric wheel loops seamlessly. The 512 rider slots that follow
# carry the visible riders (rider_animation, below). In Blender, keyframe this
# spin and the add-on samples the 8 poses for you.
# Capacity (numSeats) defaults to 32; clearance to 176.
ride_type: ferris_wheel

# The rim is Remap1 (main colour) and the gondolas are Remap2 (trim), so
# painting stays on with main + trim presets.
disable_painting: false
car_colours:
  - [bright_red, white, black]
  - [bright_green, yellow, black]
  - [dark_blue, bright_yellow, black]

meshes:
  - ferris_wheel.obj
  - gondola.obj
  - ferris_rider.obj

animation:
  frames:
