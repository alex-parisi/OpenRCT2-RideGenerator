id: openrct2rg.ride.space_rings
name: Space Rings
description: Three rings that tumble riders head over heels in slow rotation
authors: [OpenRCT2-RideGenerator]
version: "1.0"

output_directory: .

# Animated 3x3 flat ride (gentle). The object provides ONE tumbling ring; the
# engine spawns four of them (carsPerFlatRide=4) across the footprint. The ring
# is authored ONCE (space_rings.obj, disc in the X-Y plane, axle along Z, centred
# on the origin) and the animation below supplies one pose per rotation frame: a
# full 360-degree turn about Z in 88 steps (space_rings needs exactly 88). The
# engine stores 4 view directions x 88 poses (SpaceRings.cpp: base + direction +
# frame*4), then 4*88 blank rider overlays at offset 352. In Blender you keyframe
# the tumble and the add-on samples the 88 poses for you. Capacity is 1 per ring.
ride_type: space_rings

# The ring is Remap1 (main colour) and the seat is Remap2 (trim), so painting
# stays on with main + trim presets.
disable_painting: false
car_colours:
  - [bright_red, white, black]
  - [bright_yellow, dark_blue, black]
  - [light_blue, bright_pink, black]

meshes:
  - space_rings.obj

