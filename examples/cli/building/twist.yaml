id: openrct2rg.ride.twist
name: Twist
description: A whirling platform of tubs that spin beneath a striped canopy
authors: [OpenRCT2-RideGenerator]
version: "1.0"

output_directory: .

# Animated 3x3 flat ride (thrill category). Like the merry-go-round, the whole
# structure is one vehicle sprite the engine spins by cycling a ring of rotation
# frames, so it is authored ONCE (twist.obj, centred on the middle tile). The
# platform is 9-fold symmetric (nine cups), and the engine loops these 24 frames
# NINE times per revolution (Twist.cpp: base + frameNum % 24) while the 216 rider
# overlays sweep the full turn. So the 24 poses below span only ONE cup spacing
# (360/9 = 40 degrees) about +Y in 24 even steps, NOT a full turn -- the platform
# must rotate at the riders' rate, or the cups spin 9x too fast. The single ring
# is reused for every view direction. In Blender you keyframe one full turn and
# the add-on samples the structure's 40-degree slice and the riders' full turn for
# you. The 216 rider slots carry the visible riders (rider_animation, below);
# capacity defaults to 18.
ride_type: twist

# The canopy + tubs are Remap1 (main colour) and the base platform is Remap2
# (trim colour), so painting stays on with main + trim presets (from TWIST1).
disable_painting: false
car_colours:
  - [moss_green, yellow, black]
  - [white, light_blue, black]
  - [bright_red, white, black]

meshes:
  - twist.obj
  - twist_rider.obj

animation:
  frames:
    - [{mesh_index: 0, position: [0, 0, 0], orientation: [0, 0, 0]}]
    - [{mesh_index: 0, position: [0, 0, 0], orientation: [1.667, 0, 0]}]
