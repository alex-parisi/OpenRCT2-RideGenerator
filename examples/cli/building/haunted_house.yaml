id: openrct2rg.ride.haunted_house
name: Haunted House
description: A spooky mansion with a turret and lit windows
authors: [OpenRCT2-RideGenerator]
version: "1.0"

output_directory: .

# 3x3 building flat ride: 4 view sprites of the whole mansion, anchored at the
# middle tile, plus 72 blank ghost-overlay slots emitted automatically so the
# ride operates without a stray ghost sprite. Capacity defaults to 15.
ride_type: haunted_house

# The lit windows use Remap1, so painting stays on with main-colour presets.
disable_painting: false
car_colours:
  - [bright_green, black, black]
  - [bright_purple, black, black]
  - [light_orange, black, black]

meshes:
  - haunted_house.obj

model:
  - {mesh_index: 0, position: [0, 0, 0], orientation: [0, 0, 0]}
